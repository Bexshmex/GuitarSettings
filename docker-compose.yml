services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tonevault
      POSTGRES_USER: tonevault
      POSTGRES_PASSWORD: tonevault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tonevault -d tonevault"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn tonevault.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-only-secret-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost:8000}
      DATABASE_URL: postgres://tonevault:tonevault@db:5432/tonevault
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

    # To load demo data, run once:
    #   docker compose run --rm web python manage.py seed_data

volumes:
  postgres_data:
  media_data:
