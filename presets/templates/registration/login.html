{% extends 'base.html' %}

{% block title %}Login · ToneVault{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <h1 class="h4 mb-4">Login</h1>

        {% if form.errors %}
            <div class="alert alert-danger">Invalid username or password.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                    <input type="{% if field.name == 'password' %}password{% else %}text{% endif %}"
                           name="{{ field.name }}" id="{{ field.id_for_label }}"
                           class="form-control" required>
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <p class="mt-3 mb-0 text-muted">
            No account? <a href="{% url 'register' %}">Register here</a>.
        </p>
    </div>
</div>
{% endblock %}
