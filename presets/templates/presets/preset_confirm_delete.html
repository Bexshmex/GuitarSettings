{% extends 'base.html' %}

{% block title %}Delete preset · ToneVault{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <h1 class="h4 mb-4">Delete preset</h1>

        <p>Are you sure you want to delete <strong>{{ preset.song_name }}</strong> ({{ preset.band.name }})?</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a href="{% url 'preset_detail' preset.pk %}" class="btn btn-link">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
